<title>スターハンターズ</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#06000f;display:flex;justify-content:center;padding:20px 0;min-height:100vh;font-family:'Nunito','Hiragino Maru Gothic ProN',sans-serif;}
#root{width:390px;min-height:680px;background:#0d0020;border-radius:36px;overflow:hidden;box-shadow:0 0 80px rgba(180,0,255,.3),0 30px 80px rgba(0,0,0,.9);position:relative;}
button{cursor:pointer;font-family:inherit;}
button:active{transform:scale(.95);}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.7}}
@keyframes pop{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pAtk{0%{transform:translateX(0)}35%{transform:translateX(52px)}65%{transform:translateX(32px)}100%{transform:translateX(0)}}
@keyframes eAtk{0%{transform:translateX(0)}35%{transform:translateX(-52px)}65%{transform:translateX(-32px)}100%{transform:translateX(0)}}
@keyframes beHurt{0%{filter:none;transform:translateX(0)}20%{filter:brightness(4);transform:translateX(-15px)}45%{filter:brightness(2);transform:translateX(10px)}70%{transform:translateX(-8px)}100%{filter:none;transform:translateX(0)}}
@keyframes victory{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-20px) rotate(-7deg)}70%{transform:translateY(-10px) rotate(7deg)}}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes titlePop{0%{opacity:0;transform:scale(.5) translateY(40px)}60%{transform:scale(1.1) translateY(-5px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmer{0%,100%{opacity:.7}50%{opacity:1}}
.af{animation:float 2.5s ease-in-out infinite;}
.apAtk{animation:pAtk .65s ease forwards;}
.aeAtk{animation:eAtk .65s ease forwards;}
.ahurt{animation:beHurt .65s ease forwards;}
.avic{animation:victory 1.4s ease-in-out infinite;}
.aidle{animation:idle 2.8s ease-in-out infinite;}
.ashake{animation:shake .45s ease;}
.apop{animation:pop .5s cubic-bezier(.17,.67,.45,1.4) forwards;}
.afin{animation:fadeIn .4s ease;}
.apulse{animation:pulse 1.8s ease-in-out infinite;}
.afup{animation:fup 1.2s ease forwards;}
.atpop{animation:titlePop .6s cubic-bezier(.17,.67,.45,1.4) forwards;}
.ashimmer{animation:shimmer 1.5s ease-in-out infinite;}
/* ── ATTACK EFFECTS v5 ── */
@keyframes flyR{0%{opacity:0;transform:translateX(0) translateY(0) scale(.3)}15%{opacity:1;transform:translateX(12px) translateY(-6px) scale(1.3)}85%{opacity:1;transform:translateX(170px) translateY(-18px) scale(1)}100%{opacity:0;transform:translateX(210px) translateY(-28px) scale(.6)}}
@keyframes flyL{0%{opacity:0;transform:translateX(0) translateY(0) scale(.3)}15%{opacity:1;transform:translateX(-12px) translateY(-6px) scale(1.3)}85%{opacity:1;transform:translateX(-170px) translateY(-18px) scale(1)}100%{opacity:0;transform:translateX(-210px) translateY(-28px) scale(.6)}}
@keyframes hitB{0%{transform:translate(-50%,-50%) scale(0);opacity:1}40%{transform:translate(-50%,-50%) scale(1.6);opacity:.9}100%{transform:translate(-50%,-50%) scale(2.8);opacity:0}}
@keyframes hitBig{0%{transform:translate(-50%,-50%) scale(0);opacity:1}30%{transform:translate(-50%,-50%) scale(1.2);opacity:1}60%{transform:translate(-50%,-50%) scale(2.2);opacity:.8}100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}}
@keyframes dmgF{0%{transform:translateX(-50%) translateY(0) scale(.3);opacity:0}15%{transform:translateX(-50%) translateY(-18px) scale(1.6);opacity:1}75%{transform:translateX(-50%) translateY(-62px) scale(1.1);opacity:1}100%{transform:translateX(-50%) translateY(-85px) scale(.9);opacity:0}}
@keyframes atkN{0%{opacity:0;transform:translateX(-50%) translateY(8px) scale(.7)}20%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.1)}70%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-14px)}}
@keyframes bigSh{0%,100%{transform:translateX(0) translateY(0)}15%{transform:translateX(-8px) translateY(-3px)}30%{transform:translateX(8px) translateY(3px)}50%{transform:translateX(-6px) translateY(-2px)}70%{transform:translateX(6px) translateY(2px)}85%{transform:translateX(-3px)}}
@keyframes sparkRing{0%{transform:translate(-50%,-50%) scale(0);opacity:1;border-width:4px}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;border-width:1px}}
@keyframes chargeUp{0%,100%{filter:brightness(1)}50%{filter:brightness(2) saturate(2)}}
.shaking{animation:bigSh .4s ease;}
</style>

function genProb(diff,ei){
  let a,b,op,ans;
  if(diff==='easy'){const mx=Math.min(3+ei,7);a=rnd(1,mx);b=rnd(1,mx);op='+';ans=a+b;}
  else if(diff==='normal'){
    if(ei<2){a=rnd(1,9);b=rnd(1,9);op='+';ans=a+b;}
    else if(Math.random()<.5){a=rnd(1,9);b=rnd(1,9);op='+';ans=a+b;}
    else{b=rnd(1,8);a=b+rnd(1,9);op='−';ans=a-b;}
  }else{
    if(ei<2){a=rnd(11,25);b=rnd(11,22);op='+';ans=a+b;}
    else if(ei<4){if(Math.random()<.45){a=rnd(11,25);b=rnd(11,22);op='+';ans=a+b;}else{b=rnd(5,14);a=b+rnd(5,20);op='−';ans=a-b;}}
    else{if(Math.random()<.6){a=rnd(2,6);b=rnd(2,6);op='×';ans=a*b;}else{b=rnd(5,14);a=b+rnd(5,20);op='−';ans=a-b;}}
  }
  return{a,b,op,ans};
}
function makeChoices(ans){
  const s=new Set([ans]);
  for(let i=0;s.size<4&&i<80;i++){const d=rnd(1,8),c=Math.random()>.5?ans+d:Math.max(0,ans-d);if(c!==ans&&c>=0)s.add(c);}
  for(let i=ans+1;s.size<4;i++)s.add(i);
  return[...s].sort(()=>Math.random()-.5);
}

    bob:<g><ellipse cx="60" cy="44" rx="28" ry="20" fill={hc}/><rect x="22" y="57" width="76" height="22" rx="7" fill={hc}/></g>,
  };
  /* Hair front MAX y=51, eyes start at y=54.5 → face always visible */
  const HF={bun:<ellipse cx="60" cy="42" rx="20" ry="9" fill={hc}/>,twin:<ellipse cx="60" cy="42" rx="20" ry="9" fill={hc}/>,mohawk:null,long:<ellipse cx="60" cy="42" rx="22" ry="9" fill={hc}/>,bob:<rect x="28" y="37" width="64" height="14" rx="5" fill={hc}/>};
  const AM={
    none:null,
    ear:<g><circle cx="30" cy="70" r="4" fill="#ffd700"/><circle cx="90" cy="70" r="4" fill="#ffd700"/><circle cx="30" cy="70" r="2" fill="rgba(255,255,255,.6)"/><circle cx="90" cy="70" r="2" fill="rgba(255,255,255,.6)"/></g>,

    bag:<g><rect x="7" y="107" width="19" height="24" rx="6" fill={oc} opacity=".85"/><path d="M10 107 Q16.5 99 23 107" stroke={oc} strokeWidth="2.5" fill="none"/></g>,
  };
  return(
    <div className={cls} style={{display:'inline-block'}}>
      <svg width={size} height={size*1.35} viewBox="0 0 120 162" xmlns="http://www.w3.org/2000/svg">
        {HB[hid]}
        <ellipse cx="60" cy="65" rx="30" ry="28" fill="#ffd5b0"/>
        <ellipse cx="54" cy="57" rx="12" ry="8" fill="white" opacity=".1"/>

/* ── MAIN APP ── */
function App(){
  const saved=loadSave();
  const[scr,setScr]=useState('title');
  const[diff,setDiff]=useState(null);
  const[cid,setCid]=useState(null);
  const[cu,setCu]=useState({hc:0,hs:0,oc:0,sc:0,ac:0});
  const[tab,setTab]=useState('hair');
  const[seqIdx,setSeqIdx]=useState(0);
  const[story,setStory]=useState(null);
  const[eidx,setEidx]=useState(0);
  const[ehp,setEhp]=useState(0);
  const[php,setPhp]=useState(3);
  const[streak,setStreak]=useState(0);
  const[stars,setStars]=useState(0);
  const[totalStars,setTotalStars]=useState(saved.ts);
  const[completedDiffs,setCompletedDiffs]=useState(saved.cd);
  const[prob,setProb]=useState(null);
  const[chs,setChs]=useState([]);
  const[wrong,setWrong]=useState(false);
  const[wkey,setWkey]=useState(0);
  const[panim,setPanim]=useState(null);
  const[eanim,setEanim]=useState(null);
  const[bmsg,setBmsg]=useState('');
  const[qn,setQn]=useState(0);
  const[titleOverlay,setTitleOverlay]=useState(null);
  const[showRoadmap,setShowRoadmap]=useState(false);
  const[showCostume,setShowCostume]=useState(false);
  const[cosTab,setCosTab]=useState('hair');
  /* v5: attack effects */
  const[efx,setEfx]=useState([]);
  const[isSh,setIsSh]=useState(false);
  const eid=useRef(0);
  function addEfx(type,props,dur){const id=eid.current++;setEfx(p=>[...p,{id,type,...props}]);setTimeout(()=>setEfx(p=>p.filter(e=>e.id!==id)),dur);}

  const char=CHARS.find(c=>c.id===cid);
  const enemy=ENEMIES[eidx];

  /* Add stars + check title upgrade */
  function addStars(amt,curTotal){
    const nt=curTotal+amt;
    const oldT=getTitle(curTotal),newT=getTitle(nt);
    setTotalStars(nt);setStars(s=>s+amt);
    if(newT.title!==oldT.title)setTitleOverlay(newT);
    return nt;
  }

  function pickChar(id){
    const c=CHARS.find(x=>x.id===id);
    setCid(id);setCu({hc:c.dh,hs:c.ds,oc:c.do,sc:c.ds2,ac:c.da});
    setScr('customize');
  }

  function execStep(idx){
    const s=SEQ[idx];
    if(s.t==='story'){setStory(STORIES[s.k]);setScr('story');}
    else{
      const e=ENEMIES[s.ei];setEidx(s.ei);setEhp(e.hp);setPhp(3);setStreak(0);
      setWrong(false);setBmsg('');
      const p=genProb(diff,s.ei);setProb(p);setChs(makeChoices(p.ans));setQn(1);
      setScr('battle');
    }
  }

  function advance(si){const nx=si+1;setSeqIdx(nx);execStep(nx);}

  function startAdventure(){
    setStars(0);setSeqIdx(0);execStep(0);
  }

  function storyNext(){
    if(story.type==='end'){
      // Save completed difficulty
      const nd=completedDiffs.includes(diff)?completedDiffs:[...completedDiffs,diff];
      setCompletedDiffs(nd);doSave(totalStars,nd);
      setScr('title');return;
    }
    advance(seqIdx);
  }

  function doAnswer(v){
    if(!prob)return;
    if(v===prob.ans){
      const ns=streak+1;setStreak(ns);
      const dmg=ns>=3?3:ns>=2?2:1;
      const neh=Math.max(0,ehp-dmg);
      const isCombo=ns>=2;
      /* ── わざを選ぶ（コンボ時は第3わざ、それ以外はランダム0-1） ── */
      const pool=CHAR_ATKS[cid]||CHAR_ATKS.luna;
      const atk=pool[isCombo?2:rnd(0,1)];
      /* ── キャラアニメ ── */
      setPanim('attack');
      setTimeout(()=>setEanim('hurt'),380);
      setTimeout(()=>{setPanim(null);setEanim(null);},780);
      /* ── 攻撃エフェクト sequence ── */
      // 1) 発動ラベル
      addEfx('label',{n:atk.n,t:atk.t,c:atk.c},1100);
      // 2) 弾が飛ぶ
      addEfx('proj',{em:atk.e,c:atk.c,sz:atk.sz,fp:true},520);
      // 3) ヒット時バースト + ダメージ数字
      setTimeout(()=>{
        addEfx('burst',{c:atk.c,x:'71%',big:isCombo},620);
        addEfx('ring',{c:atk.c,x:'71%'},700);
        addEfx('dmg',{val:dmg,c:isCombo?'#ffb300':'#69f0ae',x:'71%',big:isCombo},1150);
      },390);
      // 4) コンボ時はスクリーンシェイク
      if(isCombo){setTimeout(()=>{setIsSh(true);setTimeout(()=>setIsSh(false),420);},390);}
      /* ── ゲーム状態更新 ── */
      setEhp(neh);
      const newTS=addStars(dmg,totalStars);
      const msg=ns>=3?'🔥 クリティカル！×3！':ns>=2?'✨ コンボ！×2！':'💥 ヒット！';
      setBmsg(msg);
      if(neh<=0){
        doSave(newTS,completedDiffs);
        setPanim('victory');
        setTimeout(()=>advance(seqIdx),1050);
      }else{
        setTimeout(()=>{const p=genProb(diff,eidx);setProb(p);setChs(makeChoices(p.ans));setWrong(false);setQn(q=>q+1);},920);
      }

        <div style={{position:'absolute',inset:0,zIndex:50,background:'rgba(0,0,8,.94)',display:'flex',flexDirection:'column'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px 0',flexShrink:0}}>
            <div style={{color:char?.ac,fontWeight:900,fontSize:15}}>👗 着替え中！</div>
            <button onClick={()=>setShowCostume(false)} style={{background:`linear-gradient(135deg,${char?.ac||'#7c4dff'},#e040fb)`,border:'none',borderRadius:14,padding:'8px 16px',color:'white',fontWeight:900,fontSize:13}}>✨ 決定！</button>
          </div>
          <div style={{display:'flex',justifyContent:'center',padding:'8px 0 2px',flexShrink:0}}>
            <div style={{filter:`drop-shadow(0 0 18px ${char?.ac||'#7c4dff'})`}}>
              <ChibiChar cid={cid} hci={cu.hc} hsi={cu.hs} oci={cu.oc} schi={cu.sc} acci={cu.ac} size={110} anim="idle"/>
            </div>
          </div>
          <div style={{display:'flex',gap:5,padding:'0 14px 8px',flexShrink:0}}>
            {[{id:'hair',l:'かみ',e:'💇'},{id:'outfit',l:'ふく',e:'👗'},{id:'shoes',l:'くつ',e:'👟'},{id:'acc',l:'アクセ',e:'💎'}].map(t=><button key={t.id} onClick={()=>setCosTab(t.id)} style={{flex:1,padding:'6px 4px',borderRadius:11,border:cosTab===t.id?`2px solid ${char?.ac||'#7c4dff'}`:'2px solid rgba(255,255,255,.1)',background:cosTab===t.id?(char?.ac||'#7c4dff')+'44':'rgba(255,255,255,.05)',color:'white',fontSize:10,fontWeight:800}}>
              <div style={{fontSize:14,marginBottom:2}}>{t.e}</div>{t.l}
            </button>)}
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'0 16px 10px'}}>
            {cosTab==='hair'&&<div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:11,fontWeight:800,marginBottom:8}}>かみのいろ</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>{HC.map((h,i)=><button key={i} onClick={()=>setCu(c=>({...c,hc:i}))} style={{width:38,height:38,borderRadius:'50%',background:h.c,border:cu.hc===i?'3px solid white':'3px solid transparent',boxShadow:cu.hc===i?`0 0 10px ${h.c}`:'none'}}/>)}</div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:11,fontWeight:800,marginBottom:8}}>スタイル</div>
              <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>{HS.map((h,i)=><button key={i} onClick={()=>setCu(c=>({...c,hs:i}))} style={{padding:'6px 10px',borderRadius:10,background:cu.hs===i?(char?.ac||'#7c4dff'):'rgba(255,255,255,.08)',border:cu.hs===i?'2px solid white':'2px solid transparent',color:'white',fontSize:11,fontWeight:800}}>{h.n}</button>)}</div>
            </div>}
            {cosTab==='outfit'&&<div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:11,fontWeight:800,marginBottom:8}}>ふくのいろ</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{OC.map((o,i)=><button key={i} onClick={()=>setCu(c=>({...c,oc:i}))} style={{width:38,height:38,borderRadius:8,background:o.c,border:cu.oc===i?'3px solid white':'3px solid transparent',boxShadow:cu.oc===i?`0 0 10px ${o.c}`:'none'}}/>)}</div>
            </div>}
            {cosTab==='shoes'&&<div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:11,fontWeight:800,marginBottom:8}}>くつのいろ</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{SC.map((s,i)=><button key={i} onClick={()=>setCu(c=>({...c,sc:i}))} style={{width:38,height:38,borderRadius:'50%',background:s.c,border:cu.sc===i?'3px solid white':'3px solid transparent',boxShadow:cu.sc===i?`0 0 10px ${s.c}`:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>👟</button>)}</div>
            </div>}
            {cosTab==='acc'&&<div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:11,fontWeight:800,marginBottom:8}}>アクセサリー</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>{ACS.map((a,i)=><button key={i} onClick={()=>setCu(c=>({...c,ac:i}))} style={{padding:'8px 5px',borderRadius:11,background:cu.ac===i?(char?.ac||'#7c4dff')+'44':'rgba(255,255,255,.07)',border:cu.ac===i?`2px solid ${char?.ac||'#7c4dff'}`:'2px solid rgba(255,255,255,.1)',color:'white',fontSize:10,fontWeight:800}}>
                <div style={{fontSize:18,marginBottom:2}}>{a.e}</div>{a.n}
              </button>)}</div>
            </div>}
          </div>
        </div>
      )}
      {STARS.slice(0,10).map((s,i)=><div key={i} style={{position:'absolute',width:s.s,height:s.s,background:'white',borderRadius:'50%',left:s.x+'%',top:(s.y*.4)+'%',opacity:.15}}/>)}
      <div style={{padding:'10px 14px 7px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
        <button onClick={()=>setScr('customize')} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:11,padding:'6px 10px',color:'white',fontWeight:800,fontSize:11}}>← やめる</button>
        <div style={{textAlign:'center'}}>
          <div style={{color:curTitle.color,fontSize:10,fontWeight:800}}>{curTitle.icon} {curTitle.title}</div>
          <div style={{color:'#ffd700',fontSize:12,fontWeight:900}}>⭐ {totalStars} / 今回 {stars}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <button onClick={()=>{setShowCostume(true);setCosTab('hair');}} style={{background:`linear-gradient(135deg,${char?.ac||'#7c4dff'}44,${char?.ac||'#7c4dff'}22)`,border:`1px solid ${char?.ac||'#7c4dff'}66`,borderRadius:10,padding:'5px 9px',color:'white',fontWeight:900,fontSize:14}}>👗</button>
          <div style={{display:'flex',gap:3}}>{[0,1,2].map(i=><span key={i} style={{fontSize:18,filter:i<php?'none':'grayscale(1)',transition:'filter .3s'}}>❤️</span>)}</div>
        </div>
      </div>
      <div className={isSh?'shaking':''} style={{position:'relative',padding:'6px 14px 0',minHeight:210,display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
        <div style={{textAlign:'center',zIndex:2}}>
          <div style={{filter:`drop-shadow(0 0 16px ${char?.ac||'#fff'})`}}>
            <ChibiChar cid={cid} hci={cu.hc} hsi={cu.hs} oci={cu.oc} schi={cu.sc} acci={cu.ac} size={100} anim={panim}/>
          </div>
          <div style={{color:char?.ac,fontSize:10,fontWeight:900}}>{char?.n}</div>
        </div>
        <div style={{flex:1,textAlign:'center',position:'relative',zIndex:3}}>
          {streak>=2&&<div className="apulse" style={{background:'linear-gradient(135deg,#ff6d00,#ff9800)',borderRadius:10,padding:'4px 10px',color:'white',fontSize:10,fontWeight:900,whiteSpace:'nowrap'}}>🔥 {streak}れんぞく！</div>}
        </div>
        <div style={{textAlign:'center',zIndex:2}}>
          <div className={eanim==='attack'?'aeAtk':eanim==='hurt'?'ahurt':''} style={{filter:`drop-shadow(0 0 14px ${enemy.c})`}}>
            <EnemySVG eid={enemy.id} sz={100}/>
          </div>
          <div style={{width:110,background:'rgba(255,255,255,.1)',borderRadius:6,height:9,border:'1px solid rgba(255,255,255,.12)',overflow:'hidden',marginTop:4}}>
            <div style={{height:'100%',borderRadius:6,background:ehp/enemy.hp>.5?'#4caf50':ehp/enemy.hp>.25?'#ff9800':'#f44336',width:(ehp/enemy.hp*100)+'%',transition:'width .45s ease'}}/>
          </div>
          <div style={{color:'rgba(255,255,255,.35)',fontSize:10,marginTop:2}}>{ehp}/{enemy.hp}</div>
        </div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,rgba(124,77,255,.4),transparent)'}}/>
        {/* ─── ATTACK EFFECTS OVERLAY ─── */}
        {efx.map(e=>{
          if(e.type==='proj')return(
            <div key={e.id} style={{position:'absolute',top:'36%',left:e.fp?'18%':'64%',fontSize:e.sz||30,lineHeight:1,filter:`drop-shadow(0 0 14px ${e.c}) drop-shadow(0 0 6px ${e.c})`,animation:`${e.fp?'flyR':'flyL'} .52s cubic-bezier(.2,.8,.4,1) forwards`,pointerEvents:'none',zIndex:10}}>
              {e.em}
            </div>
          );
          if(e.type==='burst')return(
            <div key={e.id} style={{position:'absolute',top:'28%',left:e.x,width:e.big?90:60,height:e.big?90:60,borderRadius:'50%',background:`radial-gradient(circle,${e.c}cc 0%,${e.c}44 40%,transparent 70%)`,animation:e.big?'hitBig .65s ease forwards':'hitB .55s ease forwards',pointerEvents:'none',zIndex:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:e.big?40:26}}>
              {e.big?'💥':'✦'}
            </div>
          );
          if(e.type==='ring')return(
            <div key={e.id} style={{position:'absolute',top:'28%',left:e.x,width:70,height:70,borderRadius:'50%',border:`3px solid ${e.c}`,animation:'sparkRing .7s ease forwards',pointerEvents:'none',zIndex:8}}/>
          );
          if(e.type==='dmg')return(
            <div key={e.id} style={{position:'absolute',top:'4%',left:e.x,color:e.c,fontSize:e.big?46:32,fontWeight:900,textShadow:`0 0 16px ${e.c},0 0 30px ${e.c}88,0 3px 6px rgba(0,0,0,.9)`,animation:'dmgF 1.15s cubic-bezier(.2,.8,.4,1) forwards',pointerEvents:'none',zIndex:12,fontFamily:"'Nunito',sans-serif",letterSpacing:-1}}>
              -{e.val}{e.big&&<span style={{fontSize:22}}> !!</span>}
            </div>
          );
          if(e.type==='label')return(
            <div key={e.id} style={{position:'absolute',bottom:'3%',left:'50%',textAlign:'center',animation:'atkN 1.15s ease forwards',pointerEvents:'none',zIndex:12}}>
              <div style={{fontSize:9,color:'rgba(255,255,255,.45)',fontWeight:700,letterSpacing:1}}>{e.n}</div>
              <div style={{color:e.c,fontSize:15,fontWeight:900,textShadow:`0 0 12px ${e.c},0 0 24px ${e.c}66`,whiteSpace:'nowrap'}}>{e.t}</div>
            </div>
          );
          return null;
        })}
      </div>
      {bmsg&&<div style={{margin:'5px 14px 0',background:'rgba(255,255,255,.04)',borderRadius:11,padding:'5px 12px',color:'rgba(255,255,255,.7)',fontSize:11,fontWeight:800,textAlign:'center',border:'1px solid rgba(255,255,255,.06)'}}>{bmsg}</div>}
      {prob&&<div style={{margin:'7px 14px 0',background:'rgba(5,0,20,.92)',borderRadius:20,padding:'13px 14px 15px',border:`2px solid ${wrong?'#f44336':'rgba(124,77,255,.3)'}`,transition:'border-color .3s'}}>
        <div key={wkey} className={wrong?'ashake':''}>
          {wrong&&<div style={{color:'#f44336',fontSize:12,fontWeight:900,textAlign:'center',marginBottom:7}}>まちがい！もういちど！💪</div>}
          <div style={{textAlign:'center',color:'rgba(255,255,255,.3)',fontSize:10,fontWeight:700,marginBottom:3}}>もんだい {qn}</div>
          <div style={{textAlign:'center',fontSize:42,fontWeight:900,color:'white',letterSpacing:8,lineHeight:1.15,textShadow:'0 0 18px rgba(200,150,255,.4)'}}>{prob.a} {prob.op} {prob.b}</div>
          <div style={{textAlign:'center',fontSize:26,fontWeight:900,color:char?.ac||'#7c4dff'}}>= ?</div>
          {wrong&&<div style={{textAlign:'center',color:'rgba(255,255,255,.22)',fontSize:11,marginTop:5}}>ヒント: {prob.a} と {prob.b}</div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:11}}>
          {chs.map((v,i)=><button key={v} onClick={()=>doAnswer(v)} style={{padding:'14px 0',borderRadius:14,background:`linear-gradient(135deg,${ACOLS[i].bg}cc,${ACOLS[i].bg})`,border:`2px solid ${ACOLS[i].bg}`,color:'white',fontSize:26,fontWeight:900,boxShadow:`0 4px 16px ${ACOLS[i].gl}`}}>{v}</button>)}
        </div>
      </div>}
    </div>
  );

  /* ══ DEFEAT ══ */
  if(scr==='defeat')return(
    <div className="afin" style={{background:'linear-gradient(180deg,#1a0000,#300000)',minHeight:680,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
      {titleOverlay&&<TitleOverlay data={titleOverlay} onClose={()=>setTitleOverlay(null)}/>}
      <div style={{fontSize:68,marginBottom:10}}>💫</div>
      <div style={{fontSize:34,fontWeight:900,color:'#ef5350',marginBottom:5}}>まけちゃった...</div>
      <div style={{fontSize:13,color:'#ef9a9a',marginBottom:6}}>つぎはかてるよ！がんばれ！</div>
      <div style={{color:curTitle.color,fontSize:14,fontWeight:800,marginBottom:20}}>{curTitle.icon} {curTitle.title} / ⭐ {totalStars}</div>
      <div style={{marginBottom:24,opacity:.75}}><ChibiChar cid={cid} hci={cu.hc} hsi={cu.hs} oci={cu.oc} schi={cu.sc} acci={cu.ac} size={105}/></div>
      <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%'}}>
        <button onClick={retryBattle} style={{padding:'16px',borderRadius:20,background:'linear-gradient(135deg,#e91e8c,#7c4dff)',border:'none',color:'white',fontSize:17,fontWeight:900,boxShadow:'0 8px 24px rgba(233,30,140,.4)'}}>もういちどちょうせん！🔥</button>
        <button onClick={()=>setScr('title')} style={{padding:'12px',borderRadius:20,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',color:'rgba(255,255,255,.45)',fontSize:12,fontWeight:700}}>タイトルへ</button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
